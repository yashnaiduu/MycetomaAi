server:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - http://localhost:3000
    - http://127.0.0.1:3000

inference:
  model_path: checkpoints/multitask/best_multi_task_model.pth
  device: auto
  image_size: 224

llm:
  provider: openai
  model: gpt-4o-mini
  temperature: 0
  max_tokens: 300
  cache_dir: .cache/llm

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
